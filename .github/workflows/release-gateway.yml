name: Release gateway image

# On-demand only. Pick the branch or tag in the "Run workflow" dropdown.
# Unchecked Publish  -> test build, pushes a moving :test tag.
# Checked   Publish  -> real release, pushes :<version> (+ :latest).
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Real release? Unchecked = test build (pushes :test)."
        type: boolean
        default: false
      version:
        description: "Release version, e.g. 1.0.0 (required when Publish is checked; ignored for test builds)."
        type: string
        required: false
        default: ""
      latest:
        description: "Also move the :latest tag (real releases only)."
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-gateway
  cancel-in-progress: false

env:
  IMAGE_NAME: longmen-gateway
  CONTEXT: gateway
  DOCKERFILE: gateway/Dockerfile
  README: gateway/README.md

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Guard release inputs
        env:
          PUBLISH: ${{ inputs.publish }}
          VERSION: ${{ inputs.version }}
        run: |
          if [ "$PUBLISH" = "true" ]; then
            if [ -z "$VERSION" ]; then
              echo "::error::'version' is required when Publish is checked."
              exit 1
            fi
            if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([-._][0-9A-Za-z._-]+)?$'; then
              echo "::error::'version' must be a Docker-tag-safe X.Y.Z, no '+' (got: $VERSION)."
              exit 1
            fi
          fi

  build:
    needs: validate
    environment: production
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image repo
        id: repo
        run: echo "repo=${{ vars.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          outputs: type=image,name=${{ steps.repo.outputs.repo }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    environment: production
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image repo
        id: repo
        run: echo "repo=${{ vars.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          PUBLISH: ${{ inputs.publish }}
          VERSION: ${{ inputs.version }}
          LATEST: ${{ inputs.latest }}
        run: |
          repo="${{ steps.repo.outputs.repo }}"
          if [ "$PUBLISH" = "true" ]; then
            primary="${repo}:${VERSION}"
            tags="-t ${primary}"
            if [ "$LATEST" = "true" ]; then
              tags="${tags} -t ${repo}:latest"
            fi
          else
            primary="${repo}:test"
            tags="-t ${primary}"
          fi
          echo "primary=${primary}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest from digests
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create ${{ steps.tags.outputs.tags }} \
            $(printf '${{ steps.repo.outputs.repo }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ steps.tags.outputs.primary }}

  # Real releases only: sync the component README to the Docker Hub repo Overview.
  describe:
    needs: merge
    if: ${{ inputs.publish == true }}
    environment: production
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          readme-filepath: ${{ env.README }}
